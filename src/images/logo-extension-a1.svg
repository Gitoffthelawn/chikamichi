<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">chikamichi extension icon</title>
  <desc id="desc">Flat blue rounded square icon with a compact white shortcut mark.</desc>
  <defs>
